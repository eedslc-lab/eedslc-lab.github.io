<!DOCTYPE html>
<html>
    <script src="main.js" defer></script>
    <link rel="stylesheet" href="index.css"/>
    <head>
        <title>Red Rock Demolition</title>
        <link rel="icon" type="image/jpeg" href="RedRockLogo.png">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,200&icon_names=keyboard_arrow_down,menu" />
    </head>
    <body>
        
        <div id="navigation-header-container">
            <div id="nav-header-image-title-container">
                <div id="header-image-container"><img id="header-image" src="RedRockLogo.png"></div>
                <div id="header-title">RED ROCK DEMOLITION</div>
            </div>
            <div id="nav-header-nav-container">
                <div id="navigation-menu">
                    <label><div id="home-nav" class="nav-button">HOME</div></label>
                    <label><div id="service-nav" class="nav-button">SERVICES</div></label>
                    <label><div id="about-nav" class="nav-button">PROJECTS</div></label>
                    <label><div id="projects-nav" class="nav-button">ABOUT US</div></label>
                    <label><div id="contact-nav" class="nav-button">CONTACT</div></label>
                    <label><div class="nav-button"><a id="quote-nav" class="nav-button" href="tel: 801-463-9142">801-463-9142</a></div></label>
                </div> 
                <div id="header-nav-container">
                    <div id="dropdown-indicator">
                        <label><span class="material-symbols-outlined menu-dropdown">
                            menu
                        </span></label>
                    </div>
                </div>
            </div>
        </div>
    
        <section id="home">
            <div id="home-container">
                <img src="IMG_0805.jpg" alt="Red Rock Skidster" id="home-background"> 
                <div id="one-liner-container">
                    <div id="one-liner-tag"></div>
                    <div id="one-liner">
                        <div id="contact-form-title">Contact Red Rock Demolition</div>
                        <p></p>
                        <div>Office Phone: <label><a id="phone-nav" class="contact-button" href="tel: 801-463-9142">801-463-9142</a></label></div>
                        <div>Office Email: <label><a id="email-nav" class="contact-button" href="mailto: kayc@redrockdemolition.com?subject=Website%20Contact">kayc@redrockdemolition.com</a></label></div>
                        <div>For Job Inquiries: </div>
                    </div>
                </div>
            </div>
        </section>

        
        <section id="service">
            <div id="service-container">
                <div class="scroll-indicator">
                    <span class="material-symbols-outlined down-arrow">
                        keyboard_arrow_down
                    </span>
                </div>
                <div id="service-title">
                    SERVICES
                </div>
                <div id="service-title-underline"></div>
                <div id="service-card-container">
                    <div id="service-card-1" class="service-cards">
                        <img class="service-card-image" src="https://static.wixstatic.com/media/c19c76_22d8ec47d1484b09a9c333e4141a12a0.jpg/v1/fill/w_600,h_454,al_c,q_80,usm_0.66_1.00_0.01,enc_avif,quality_auto/c19c76_22d8ec47d1484b09a9c333e4141a12a0.jpg" alt="">
                        <div class="service-image-overlay">
                            <div class="text">Pre Construction Consultation</div>
                        </div>
                    </div>
                    <div id="service-card-2" class="service-cards">
                        <img class="service-card-image" src="IMG_0010.JPG" alt="">
                        <div class="service-image-overlay">
                            <div class="text">Interior and Exterior Demolition</div>
                        </div>
                    </div>
                    <div id="service-card-3" class="service-cards">
                        <img class="service-card-image" src="IMG_6297.jpeg" alt="">
                        <div class="service-image-overlay">
                            <div class="text">Saw Cutting and Concrete</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section id="projects">
            <div id="projects-container">
                <div class="scroll-indicator">
                    <span class="material-symbols-outlined down-arrow">
                        keyboard_arrow_down
                    </span>
                </div>
                <div id="projects-title">
                    PROJECTS
                </div>
                <div id="project-title-underline"></div>
                <div id="project-card-container">
                    <div id="project-card-1" class="project-cards">

                    </div>
                    <div id="project-card-2" class="project-cards">

                    </div>
                    <div id="project-card-3" class="project-cards">

                    </div>
                </div>
            </div>
        </section>
    </body>
</html>
